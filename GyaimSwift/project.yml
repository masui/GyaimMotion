name: Gyaim
options:
  bundleIdPrefix: com.pitecan.inputmethod
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

targets:
  Gyaim:
    type: application
    platform: macOS
    sources:
      - path: Sources/Gyaim
      - path: Resources
        excludes:
          - Info.plist
        buildPhase: resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.pitecan.inputmethod.Gyaim
      INFOPLIST_FILE: Resources/Info.plist
      SWIFT_VERSION: "5.9"
      PRODUCT_NAME: Gyaim
    frameworks:
      - InputMethodKit
      - Security

  GyaimTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/GyaimTests
      - path: Sources/Gyaim
        excludes:
          - main.swift
      - path: Resources
        excludes:
          - Info.plist
        buildPhase: resources
    settings:
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.pitecan.inputmethod.Gyaim.Tests
    frameworks:
      - InputMethodKit
      - Security

  GyaimE2ETests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/E2ETests
    settings:
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.pitecan.inputmethod.Gyaim.E2ETests
    frameworks:
      - Carbon
      - Cocoa
